name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build.clj uses (b/git-count-revs nil) for the version suffix;
          # full history is required for that to count correctly.
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: "latest"

      - name: Install libopenblas
        # Smile's UMAP/PCA path calls SVD via a LAPACK FFI binding that
        # System.loadLibrary's "openblas". The runner doesn't ship it.
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Cache Maven and tools.deps caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-

      - name: Cache inference4j model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/inference4j
          key: inference4j-models-${{ hashFiles('deps.edn') }}
          restore-keys: |
            inference4j-models-

      - name: Run tests
        run: clojure -M:test

  deploy:
    name: Deploy to Clojars
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: "latest"

      - name: Cache Maven and tools.deps caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-

      - name: Build JAR
        run: clojure -T:build jar

      - name: Deploy to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:build deploy
